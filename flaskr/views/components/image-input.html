<section class="flex flex-col col-start-2 col-end-3 row-start-1 row-end-6 mb-2"
    id="image-preview"
    style="display: none"
    x-show="imageSet">
	<img src="{{ data['image'] }}" class="rounded mb-2 self-center max-h-[380px]">
	<button class="self-end p-2 rounded-3xl border border-zinc-200 hover:bg-zinc-200 aspect-square flex justify-center items-center dark:border-zinc-600 dark:hover:bg-zinc-600"
        x-on:click="event => {
            event.preventDefault();
            document.getElementById('image-input').value = '';
            document.querySelector('#image-preview > img').setAttribute('src', '');

            imageSet = false;
        }">
		<i class="las la-times text-2xl"></i>
	</button>
</section>
<p class="col-start-2 col-end-3 row-start-1 row-end-3 flex flex-col mb-2" x-show="useImage && !imageSet">
	<label for="image-input"
	{% if 'image' in data['errors'] %}
		class="flex flex-row justify-center items-center border border-dashed border-red-500 rounded w-full p-4 sm:text-sm font-medium min-h-32 h-full cursor-pointer">
	{% else %}
		class="flex flex-row justify-center items-center border border-dashed border-zinc-200 rounded w-full p-4 sm:text-sm font-medium min-h-32 h-full cursor-pointer dark:border-zinc-600">
	{% endif %}

		<i class="las la-file-image text-2xl mr-1"></i>
		Add Image
	</label>
	<input type="file" name="image" id="image-input" accept="image/jpg, image/jpeg, image/png" class="hidden"
        x-on:change="() => {
            document.querySelector('#image-preview > img')
                .setAttribute('src', URL.createObjectURL(document.getElementById('image-input').files[0]));
            imageSet = true;
        }">
</p>
{% if request.path.split("/")[2] == "edit" %}
    <script>
        /* 
            Programatically set the file input value as an empty file named "same_image".
            In case the user does not change the clothing item image, this empty file will
            be sent in the request, and the server will know that the image did not change.
        */
        const fileInput = document.getElementById("image-input");

        const fileContent = [""];
        const fileName = "same_image";
        const file = new File(fileContent, fileName);

        const dataTransfer = new DataTransfer();
        dataTransfer.items.add(file);

        const fileList = dataTransfer.files;
        fileInput.files = fileList;
    </script>
{% endif %}
